<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot For Zin - 관리자</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .admin-wrapper { display: flex; width: min(1000px, 100%); height: min(90vh, 900px); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .sidebar { width: 200px; background: #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { padding: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        .logo-area img { width: 140px; height: auto; display: block; }
        .nav-section { padding: 10px 0; flex: 1; }
        .nav-label { font-size: 10px; color: rgba(255,255,255,0.3); padding: 4px 16px 6px; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; color: rgba(255,255,255,0.55); cursor: pointer; font-size: 12px; border-left: 2px solid transparent; text-decoration: none; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.08); border-left: 2px solid #CC0000; }
        .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
        .nav-item.active .nav-dot { background: #CC0000; }
        .admin-container { flex: 1; background: #f8f9fb; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: white; border-bottom: 0.5px solid #e0e0e0; padding: 0 20px; height: 50px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .topbar-left { display: flex; align-items: center; gap: 8px; }
        .topbar-title { font-size: 14px; font-weight: 500; color: #222; }
        .topbar-badge { font-size: 10px; background: #fff0f0; color: #CC0000; padding: 2px 8px; border-radius: 10px; }
        .back-btn { font-size: 11px; color: #666; text-decoration: none; border: 0.5px solid #ddd; border-radius: 4px; padding: 4px 10px; }
        .back-btn:hover { background: #f5f5f5; }
        .main { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        .card { background: white; border-radius: 12px; padding: 24px; border: 0.5px solid #e5e5e5; }
        .card-title { font-size: 14px; font-weight: 500; color: #222; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 0.5px solid #eee; display: flex; align-items: center; gap: 6px; }
        .upload-area { border: 1.5px dashed #ddd; border-radius: 10px; padding: 36px; text-align: center; cursor: pointer; transition: 0.2s; }
        .upload-area:hover { border-color: #CC0000; background: #fff8f8; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 28px; margin-bottom: 8px; }
        .upload-area p { color: #666; font-size: 13px; margin-top: 4px; }
        .upload-area small { color: #bbb; font-size: 11px; margin-top: 4px; display: block; }
        .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'Malgun Gothic', sans-serif; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #CC0000; color: white; }
        .btn-success:hover { background: #aa0000; }
        .file-list { display: flex; flex-direction: column; gap: 8px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f9fb; border-radius: 8px; border: 0.5px solid #eee; gap: 12px; }
        .file-info { display: flex; align-items: center; gap: 10px; }
        .file-icon { width: 32px; height: 32px; background: #fff0f0; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .file-name { font-size: 13px; color: #333; word-break: break-all; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1a1a1a; color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 100; }
        .toast.show { opacity: 1; }
        .loading-bar { display: none; height: 3px; background: #CC0000; border-radius: 2px; margin-top: 12px; animation: loading 1s infinite; }
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
        .empty { text-align: center; color: #bbb; padding: 24px; font-size: 13px; }
        .reload-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .reload-desc { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="sidebar">
            <div class="logo-area">
                <img src="images/35-3621.png" alt="ZIN Corporation" onerror="this.style.display='none'"/>
            </div>
            <div class="nav-section">
                <div class="nav-label">메뉴</div>
                <a href="index.html" class="nav-item"><div class="nav-dot"></div>챗봇</a>
                <a href="faq.html" class="nav-item"><div class="nav-dot"></div>자주 묻는 질문</a>
                <a href="documents.html" class="nav-item"><div class="nav-dot"></div>규정 문서</a>
                <a href="admin.html" class="nav-item active"><div class="nav-dot"></div>관리자</a>
            </div>
        </div>

        <div class="admin-container">
            <div class="topbar">
                <div class="topbar-left">
                    <div class="topbar-title">관리자 페이지</div>
                    <div class="topbar-badge">PDF 관리</div>
                </div>
                <a href="index.html" class="back-btn">← 챗봇으로 돌아가기</a>
            </div>

            <div class="main">
                <div class="card">
                    <div class="card-title">📤 PDF 업로드</div>
                    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon">📄</div>
                        <p>클릭해서 PDF 파일을 선택하세요</p>
                        <small>PDF 파일만 업로드할 수 있습니다</small>
                        <input type="file" id="fileInput" accept=".pdf,application/pdf" onchange="uploadFile(this)"/>
                    </div>
                    <div class="loading-bar" id="loadingBar"></div>
                </div>

                <div class="card">
                    <div class="card-title">📁 업로드된 파일 목록</div>
                    <div class="file-list" id="fileList">
                        <div class="empty">파일 목록을 불러오는 중입니다...</div>
                    </div>
                </div>

                <div class="card">
                    <div class="reload-row">
                        <div>
                            <div class="card-title" style="border:none;margin:0;padding:0;">🔄 DB 재색인</div>
                            <div class="reload-desc">업로드된 PDF 기준으로 벡터DB를 다시 생성합니다</div>
                        </div>
                        <button class="btn btn-success" onclick="reloadDB()">재색인 실행</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'http://127.0.0.1:8000';

        function setLoading(visible) {
            document.getElementById('loadingBar').style.display = visible ? 'block' : 'none';
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function createFileItem(file) {
            const item = document.createElement('div');
            item.className = 'file-item';
            const info = document.createElement('div');
            info.className = 'file-info';
            const icon = document.createElement('div');
            icon.className = 'file-icon';
            icon.textContent = '📄';
            const nameWrap = document.createElement('div');
            const name = document.createElement('div');
            name.className = 'file-name';
            name.textContent = file;
            nameWrap.appendChild(name);
            info.appendChild(icon);
            info.appendChild(nameWrap);
            const button = document.createElement('button');
            button.className = 'btn btn-danger';
            button.textContent = '삭제';
            button.onclick = () => deleteFile(file);
            item.appendChild(info);
            item.appendChild(button);
            return item;
        }

        async function loadFiles() {
            const list = document.getElementById('fileList');
            try {
                const res = await fetch(`${API}/admin/files`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '파일 목록 조회 실패');
                if (!data.files.length) {
                    list.innerHTML = '<div class="empty">업로드된 PDF가 없습니다</div>';
                    return;
                }
                list.innerHTML = '';
                data.files.forEach(file => list.appendChild(createFileItem(file)));
            } catch (e) {
                list.innerHTML = '<div class="empty">파일 목록을 불러오지 못했습니다</div>';
                showToast(e.message || '파일 목록 조회 실패');
            }
        }

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showToast('PDF 파일만 업로드할 수 있습니다');
                input.value = '';
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            setLoading(true);
            try {
                const res = await fetch(`${API}/admin/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '업로드 실패');
                showToast(data.message);
                await loadFiles();
            } catch (e) {
                showToast(e.message || '업로드 실패');
            } finally {
                setLoading(false);
                input.value = '';
            }
        }

        async function deleteFile(filename) {
            if (!confirm(`${filename} 파일을 삭제할까요?`)) return;
            try {
                const res = await fetch(`${API}/admin/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '삭제 실패');
                showToast(data.message);
                await loadFiles();
            } catch (e) {
                showToast(e.message || '삭제 실패');
            }
        }

        async function reloadDB() {
            setLoading(true);
            try {
                const res = await fetch(`${API}/admin/reload`, { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '재색인 실패');
                showToast(data.message);
            } catch (e) {
                showToast(e.message || '재색인 실패');
            } finally {
                setLoading(false);
            }
        }

        loadFiles();
    </script>
</body>
</html>
