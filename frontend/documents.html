<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot For Zin - Documents</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-wrapper { display: flex; width: min(1000px, 100%); height: min(90vh, 900px); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .sidebar { width: 200px; background: #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { padding: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        .logo-area img { width: 140px; height: auto; display: block; }
        .nav-section { padding: 10px 0; flex: 1; }
        .nav-label { font-size: 10px; color: rgba(255,255,255,0.3); padding: 4px 16px 6px; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; color: rgba(255,255,255,0.55); text-decoration: none; font-size: 12px; border-left: 2px solid transparent; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.08); border-left: 2px solid #CC0000; }
        .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
        .nav-item.active .nav-dot { background: #CC0000; }
        .page-container { flex: 1; background: white; display: flex; flex-direction: column; overflow: hidden; }
        .page-header { background: white; border-bottom: 0.5px solid #e0e0e0; padding: 0 20px; height: 50px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .page-header-left { display: flex; align-items: center; gap: 8px; }
        .page-header h1 { font-size: 14px; font-weight: 500; color: #222; }
        .header-badge { font-size: 10px; background: #fff0f0; color: #CC0000; padding: 2px 8px; border-radius: 10px; }
        .admin-link { font-size: 11px; color: #666; text-decoration: none; border: 0.5px solid #ddd; border-radius: 4px; padding: 4px 8px; }
        .admin-link:hover { background: #f5f5f5; }
        .page-body { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fb; }
        .intro-card { background: white; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .intro-card h2 { font-size: 14px; color: #222; margin-bottom: 6px; }
        .intro-card p { font-size: 12px; color: #666; line-height: 1.6; }
        .doc-list { display: flex; flex-direction: column; gap: 12px; }
        .doc-item { background: white; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .doc-name { font-size: 13px; color: #222; word-break: break-all; }
        .doc-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .doc-link { text-decoration: none; font-size: 12px; color: #CC0000; border: 0.5px solid #CC0000; border-radius: 18px; padding: 6px 12px; }
        .doc-link:hover { background: #CC0000; color: white; }
        .empty-card { background: white; border: 0.5px solid #e5e5e5; border-radius: 12px; padding: 20px; text-align: center; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="sidebar">
            <div class="logo-area">
                <img src="images/35-3621.png" alt="ZIN Corporation" onerror="this.style.display='none'"/>
            </div>
            <div class="nav-section">
                <div class="nav-label">메뉴</div>
                <a class="nav-item" href="index.html"><div class="nav-dot"></div>챗봇</a>
                <a class="nav-item" href="faq.html"><div class="nav-dot"></div>자주 묻는 질문</a>
                <a class="nav-item active" href="documents.html"><div class="nav-dot"></div>규정 문서</a>
                <a class="nav-item" href="admin.html"><div class="nav-dot"></div>관리자</a>
            </div>
        </div>

        <div class="page-container">
            <div class="page-header">
                <div class="page-header-left">
                    <h1>규정 문서</h1>
                    <div class="header-badge">원문 확인</div>
                </div>
                <a href="admin.html" class="admin-link">관리자</a>
            </div>
            <div class="page-body">
                <div class="intro-card">
                    <h2>업로드된 규정 PDF</h2>
                    <p>현재 챗봇이 참고하는 규정 문서를 확인하고 원문 PDF를 바로 열 수 있습니다.</p>
                </div>

                <div class="doc-list" id="docList">
                    <div class="empty-card">문서 목록을 불러오는 중입니다...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';

        function renderEmpty(message) {
            const list = document.getElementById('docList');
            list.innerHTML = `<div class="empty-card">${message}</div>`;
        }

        function createDocItem(filename) {
            const item = document.createElement('div');
            item.className = 'doc-item';

            const name = document.createElement('div');
            name.className = 'doc-name';
            name.textContent = filename;

            const actions = document.createElement('div');
            actions.className = 'doc-actions';

            const openLink = document.createElement('a');
            openLink.className = 'doc-link';
            openLink.href = `${API}/docs/${encodeURIComponent(filename)}`;
            openLink.target = '_blank';
            openLink.rel = 'noopener noreferrer';
            openLink.textContent = 'PDF 열기';

            const askLink = document.createElement('a');
            askLink.className = 'doc-link';
            askLink.href = `index.html?document=${encodeURIComponent(filename)}&question=${encodeURIComponent('이 문서를 기준으로 답변해줘')}`;
            askLink.textContent = '챗봇에 질문';

            actions.appendChild(openLink);
            actions.appendChild(askLink);
            item.appendChild(name);
            item.appendChild(actions);
            return item;
        }

        async function loadDocs() {
            try {
                const res = await fetch(`${API}/admin/files`);
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || '문서 목록 조회 실패');
                }

                if (!data.files.length) {
                    renderEmpty('업로드된 문서가 없습니다.');
                    return;
                }

                const list = document.getElementById('docList');
                list.innerHTML = '';
                data.files.forEach(file => list.appendChild(createDocItem(file)));
            } catch (e) {
                renderEmpty(e.message || '문서 목록을 불러오지 못했습니다.');
            }
        }

        loadDocs();
    </script>
</body>
</html>
