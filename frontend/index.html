<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot For Zin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 800px; height: 90vh; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .chat-header { background: #4A90E2; color: white; padding: 20px; border-radius: 16px 16px 0 0; text-align: center; }
        .chat-header h1 { font-size: 20px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; }
        .message.bot { background: #f0f2f5; align-self: flex-start; }
        .message.user { background: #4A90E2; color: white; align-self: flex-end; }
        .suggested { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .suggested button { background: white; border: 1px solid #4A90E2; color: #4A90E2; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .suggested button:hover { background: #4A90E2; color: white; }
        .chat-input { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
        .chat-input button { background: #4A90E2; color: white; border: none; padding: 12px 24px; border-radius: 24px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #357ABD; }
        .loading { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🏢 사내규정 안내 챗봇</h1>
            <p style="font-size:13px; margin-top:4px;">궁금한 사내규정을 질문해보세요!</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                안녕하세요! 사내규정 안내 챗봇입니다 😊<br>궁금한 점을 질문해주세요!
                <div class="suggested">
                    <button onclick="sendMessage('연차는 며칠인가요?')">연차는 며칠인가요?</button>
                    <button onclick="sendMessage('복지제도가 뭐가 있나요?')">복지제도가 뭐가 있나요?</button>
                    <button onclick="sendMessage('출퇴근 시간은 어떻게 되나요?')">출퇴근 시간은 어떻게 되나요?</button>
                </div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="if(event.key==='Enter') sendMessage()"/>
            <button onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script>
        async function sendMessage(text) {
            const input = document.getElementById('userInput');
            const message = text || input.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            input.value = '';

            const loading = appendMessage('답변을 생성중입니다...', 'bot loading');

            try {
                const res = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                loading.remove();
                appendBotMessage(data.answer, data.suggested_questions);
            } catch (e) {
                loading.remove();
                appendMessage('오류가 발생했습니다. 다시 시도해주세요.', 'bot');
            }
        }

        function appendMessage(text, className) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function appendBotMessage(answer, suggestions) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = answer;

            if (suggestions && suggestions.length > 0) {
                const sugDiv = document.createElement('div');
                sugDiv.className = 'suggested';
                suggestions.forEach(q => {
                    const btn = document.createElement('button');
                    btn.textContent = q;
                    btn.onclick = () => sendMessage(q);
                    sugDiv.appendChild(btn);
                });
                div.appendChild(sugDiv);
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
