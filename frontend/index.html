<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot For Zin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-wrapper { display: flex; width: min(1000px, 100%); height: min(90vh, 900px); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .sidebar { width: 200px; background: #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { padding: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        .logo-area img { width: 140px; height: auto; display: block; }
        .nav-section { padding: 10px 0; flex: 1; }
        .nav-label { font-size: 10px; color: rgba(255,255,255,0.3); padding: 4px 16px 6px; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; color: rgba(255,255,255,0.55); text-decoration: none; font-size: 12px; border-left: 2px solid transparent; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.08); border-left: 2px solid #CC0000; }
        .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
        .nav-item.active .nav-dot { background: #CC0000; }
        .chat-container { flex: 1; background: white; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: white; border-bottom: 0.5px solid #e0e0e0; padding: 0 20px; height: 50px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .chat-header-left { display: flex; align-items: center; gap: 8px; }
        .chat-header h1 { font-size: 14px; font-weight: 500; color: #222; }
        .header-badge { font-size: 10px; background: #fff0f0; color: #CC0000; padding: 2px 8px; border-radius: 10px; }
        .document-badge { font-size: 10px; background: #f5f5f5; color: #555; padding: 2px 8px; border-radius: 10px; max-width: 320px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .admin-link { font-size: 11px; color: #666; text-decoration: none; border: 0.5px solid #ddd; border-radius: 4px; padding: 4px 8px; }
        .admin-link:hover { background: #f5f5f5; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #f8f9fb; }
        .message { max-width: 78%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; word-break: break-word; }
        .message.bot { background: white; border: 0.5px solid #e5e5e5; align-self: flex-start; border-radius: 0 12px 12px 12px; }
        .message.user { background: #1a1a1a; color: white; align-self: flex-end; border-radius: 12px 0 12px 12px; }
        .message-text { white-space: pre-line; font-size: 13px; }
        .suggested { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .suggested button { background: #fff5f5; border: 0.5px solid #CC0000; color: #CC0000; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Malgun Gothic', sans-serif; }
        .suggested button:hover { background: #CC0000; color: white; }
        .chat-input { padding: 12px 16px; border-top: 0.5px solid #e0e0e0; display: flex; gap: 8px; background: white; }
        .chat-input input { flex: 1; padding: 10px 16px; border: 0.5px solid #ddd; border-radius: 24px; outline: none; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; background: #f8f9fb; }
        .chat-input button { background: #CC0000; color: white; border: none; padding: 10px 22px; border-radius: 24px; cursor: pointer; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; }
        .chat-input button:hover { background: #aa0000; }
        .loading { color: #999; font-style: italic; }
        .sources { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .source-item { background: rgba(255,255,255,0.65); border: 0.5px solid #d7dfe8; border-radius: 8px; overflow: hidden; }
        .source-item summary { cursor: pointer; list-style: none; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 12px; color: #234; }
        .source-item summary::-webkit-details-marker { display: none; }
        .source-title { font-weight: 700; }
        .source-hint { font-size: 11px; color: #678; }
        .source-body { padding: 0 12px 12px; border-top: 0.5px solid #e1e8ef; background: #fff; }
        .source-preview { margin-top: 10px; font-size: 12px; color: #444; white-space: pre-wrap; }
        .source-link { display: inline-block; margin-top: 10px; color: #CC0000; text-decoration: none; font-size: 12px; font-weight: 700; }
        .source-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="sidebar">
            <div class="logo-area">
                <img src="images/35-3621.png" alt="ZIN Corporation" onerror="this.style.display='none'"/>
            </div>
            <div class="nav-section">
                <div class="nav-label">메뉴</div>
                <a class="nav-item active" href="index.html"><div class="nav-dot"></div>챗봇</a>
                <a class="nav-item" href="faq.html"><div class="nav-dot"></div>자주 묻는 질문</a>
                <a class="nav-item" href="documents.html"><div class="nav-dot"></div>규정 문서</a>
                <a class="nav-item" href="admin.html"><div class="nav-dot"></div>관리자</a>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-header-left">
                    <h1>사내규정 안내 챗봇</h1>
                    <div class="header-badge">신입사원 안내</div>
                    <div class="document-badge" id="documentBadge" style="display:none;"></div>
                </div>
                <a href="admin.html" class="admin-link">관리자</a>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-text">안녕하세요. 사내규정 안내 챗봇입니다.
궁금한 내용을 질문해 주세요.</div>
                    <div class="suggested">
                        <button onclick="sendMessage('연차는 어떻게 사용하나요?')">연차는 어떻게 사용하나요?</button>
                        <button onclick="sendMessage('복리후생에는 무엇이 있나요?')">복리후생에는 무엇이 있나요?</button>
                        <button onclick="sendMessage('출퇴근 시간은 어떻게 되나요?')">출퇴근 시간은 어떻게 되나요?</button>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="질문을 입력해 주세요" onkeypress="if(event.key==='Enter') sendMessage()"/>
                <button onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://ai-chatbot-for-zin.onrender.com';
        const params = new URLSearchParams(window.location.search);
        const selectedDocument = params.get('document');

        function updateDocumentBadge() {
            const badge = document.getElementById('documentBadge');
            if (selectedDocument) {
                badge.textContent = `기준 문서: ${selectedDocument}`;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        function scrollToBottom() {
            const messages = document.getElementById('chatMessages');
            messages.scrollTop = messages.scrollHeight;
        }

        function appendTextMessage(text, className) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const textDiv = document.createElement('div');
            div.className = `message ${className}`;
            textDiv.className = 'message-text';
            textDiv.textContent = text;
            div.appendChild(textDiv);
            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function createSuggestedQuestions(suggestions) {
            if (!suggestions || !suggestions.length) return null;
            const sugDiv = document.createElement('div');
            sugDiv.className = 'suggested';
            suggestions.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q;
                btn.onclick = () => sendMessage(q);
                sugDiv.appendChild(btn);
            });
            return sugDiv;
        }

        function createSourceItem(filename, content) {
            const details = document.createElement('details');
            details.className = 'source-item';
            const summary = document.createElement('summary');
            const title = document.createElement('span');
            title.className = 'source-title';
            title.textContent = filename;
            const hint = document.createElement('span');
            hint.className = 'source-hint';
            hint.textContent = '펼쳐서 문맥 보기';
            summary.appendChild(title);
            summary.appendChild(hint);
            details.appendChild(summary);
            const body = document.createElement('div');
            body.className = 'source-body';
            const preview = document.createElement('div');
            preview.className = 'source-preview';
            preview.textContent = content;
            body.appendChild(preview);
            const link = document.createElement('a');
            link.className = 'source-link';
            link.href = `${API}/docs/${encodeURIComponent(filename)}`;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = '원문 PDF 열기';
            body.appendChild(link);
            details.appendChild(body);
            return details;
        }

        function createSourcesSection(sources) {
            if (!sources || !Object.keys(sources).length) return null;
            const wrap = document.createElement('div');
            wrap.className = 'sources';
            Object.entries(sources).forEach(([filename, content]) => {
                wrap.appendChild(createSourceItem(filename, content));
            });
            return wrap;
        }

        function appendBotMessage(answer, suggestions, sources) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const textDiv = document.createElement('div');
            div.className = 'message bot';
            textDiv.className = 'message-text';
            textDiv.textContent = answer;
            div.appendChild(textDiv);
            const sourcesSection = createSourcesSection(sources);
            if (sourcesSection) div.appendChild(sourcesSection);
            const sugDiv = createSuggestedQuestions(suggestions);
            if (sugDiv) div.appendChild(sugDiv);
            messages.appendChild(div);
            scrollToBottom();
        }

        async function sendMessage(text) {
            const input = document.getElementById('userInput');
            const message = text || input.value.trim();
            if (!message) return;
            appendTextMessage(message, 'user');
            input.value = '';
            const loading = appendTextMessage('답변을 생성하는 중입니다...', 'bot loading');
            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, document: selectedDocument })
                });
                const data = await res.json();
                loading.remove();
                if (!res.ok) throw new Error(data.detail || '답변 생성 실패');
                appendBotMessage(data.answer, data.suggested_questions, data.sources);
            } catch (e) {
                loading.remove();
                appendTextMessage(e.message || '오류가 발생했습니다. 다시 시도해 주세요.', 'bot');
            }
        }

        updateDocumentBadge();

        const presetQuestion = params.get('question');
        if (presetQuestion) {
            document.getElementById('userInput').value = presetQuestion;
            sendMessage(presetQuestion);
        }
    </script>
</body>
</html>
